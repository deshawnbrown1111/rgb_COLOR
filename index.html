<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Export — PNG Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <div class="header">
    <div class="header-logo">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <rect width="34" height="34" rx="9" fill="#4285F4"/>
        <rect x="6"  y="6"  width="9" height="9" rx="2.5" fill="#fff"    opacity=".92"/>
        <rect x="19" y="6"  width="9" height="9" rx="2.5" fill="#EA4335" opacity=".92"/>
        <rect x="6"  y="19" width="9" height="9" rx="2.5" fill="#34A853" opacity=".92"/>
        <rect x="19" y="19" width="9" height="9" rx="2.5" fill="#FBBC05" opacity=".92"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Color Export</div>
      <div class="header-sub">Solid color PNG generator</div>
    </div>
  </div>

  <!-- ── Card ───────────────────────────────────────────────────────── -->
  <div class="card">

    <!-- Color preview strip -->
    <div id="preview">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span id="badge-hex"   class="preview-badge badge-hex">#4285F4</span>
        <span id="badge-hsl"   class="preview-badge badge-hsl">HSL 217° 89% 61%</span>
      </div>
      <span   id="badge-ratio" class="preview-badge badge-ratio">16:9</span>
    </div>

    <div class="card-body">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="hex">HEX</button>
        <button class="tab"        data-tab="rgb">RGB</button>
        <button class="tab"        data-tab="picker">Picker</button>
      </div>

      <!-- HEX Panel -->
      <div class="panel active" id="panel-hex">
        <div class="hex-row">
          <div class="hex-swatch" id="hex-swatch" style="background:#4285F4"></div>
          <input class="hex-input" id="hex-input" type="text" value="#4285F4" maxlength="7" placeholder="#4285F4"/>
          <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
      </div>

      <!-- RGB Panel -->
      <div class="panel" id="panel-rgb">
        <div class="rgb-row">
          <div class="rgb-item">
            <span class="rgb-label r">Red</span>
            <input type="range"  class="range-r" id="range-r" min="0" max="255" value="66"/>
            <input type="number" class="rgb-num"  id="num-r"   min="0" max="255" value="66"/>
          </div>
          <div class="rgb-item">
            <span class="rgb-label g">Green</span>
            <input type="range"  class="range-g" id="range-g" min="0" max="255" value="133"/>
            <input type="number" class="rgb-num"  id="num-g"   min="0" max="255" value="133"/>
          </div>
          <div class="rgb-item">
            <span class="rgb-label b">Blue</span>
            <input type="range"  class="range-b" id="range-b" min="0" max="255" value="244"/>
            <input type="number" class="rgb-num"  id="num-b"   min="0" max="255" value="244"/>
          </div>
        </div>
      </div>

      <!-- Picker Panel -->
      <div class="panel" id="panel-picker">
        <div class="picker-row">
          <input type="color" id="color-picker" value="#4285F4"/>
          <div class="picker-info">
            <div class="picker-hex" id="picker-hex">#4285F4</div>
            <div class="picker-sub" id="picker-rgb">rgb(66, 133, 244)</div>
            <div class="picker-sub" id="picker-hsl">hsl(217°, 89%, 61%)</div>
          </div>
        </div>
      </div>

      <!-- Swatches -->
      <div class="divider"></div>
      <div class="sec-label">Swatches</div>
      <div class="presets" id="presets"></div>

      <div class="divider"></div>

      <!-- Aspect Ratio -->
      <div class="sec-label">Aspect Ratio</div>
      <div class="chips" id="ratio-chips"></div>
      <div class="custom-ratio" id="custom-ratio">
        <input type="number" class="custom-num" id="cw" value="16" min="1" max="100"/>
        <span class="custom-sep">:</span>
        <input type="number" class="custom-num" id="ch" value="9"  min="1" max="100"/>
        <span class="custom-hint">width : height</span>
      </div>

      <div class="divider"></div>

      <!-- Output Size -->
      <div class="sec-label">Output Size</div>
      <div class="size-chips" id="size-chips"></div>

      <!-- Dimension readout -->
      <div class="info-box">
        <span class="info-label">Output dimensions</span>
        <span class="info-value" id="dimensions">1024 × 576 px</span>
      </div>

      <!-- Download -->
      <button class="dl-btn" id="dl-btn">
        <svg class="dl-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 3v13M7 12l5 5 5-5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 20h16"              stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <div class="spinner"></div>
        <span class="dl-text">Download PNG</span>
      </button>

    </div>
  </div>

  <div class="footer">Generates a solid-fill PNG at full resolution · No upload needed</div>

  <canvas id="canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
